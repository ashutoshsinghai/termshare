project_name: termshare

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/ashutoshsinghai/termshare/cmd.Version={{.Tag}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: ashutoshsinghai
    name: termshare
  name_template: "v{{ .Version }}"
  extra_files:
    - glob: scripts/install.sh
    - glob: scripts/install.ps1
